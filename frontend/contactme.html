<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link rel="icon" href="images/wotteo.jpg"  type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="css/chatbot.css" rel="stylesheet" >
    <link href="css/contactme.css" rel="stylesheet" >
</head>
<body>
    <div class="canvas-container">
        <canvas id="backgroundCanvas"></canvas>
    </div>
    <a href="index.html" class="back-icon">
        <i class="fa-solid fa-arrow-left-long"></i>
    </a>
    <div class="contact-container">
        <div class="contact-left">
            <h1>Contact Me</h1>
            <p>If you'd like to make an inquiry, please feel free to get in touch, and I will respond as soon as possible.</p>
            <p>If you prefer to contact me directly, send your Email to: <a href="mailto:email@example.com">email@noor.com</a></p>
            <p>Follow me on Twitter: <a href="#">@iamnoor</a></p>
        </div>
        <div class="contact-right">
            <img src="/images/stamp.jpg" alt="Stamp" class="stamp">
            <form id="contactForm"> 
                <label for="name">NAME:* </label>
                <input type="text" id="name" placeholder="Your Name" required>
        
                <label for="email">EMAIL:* </label>
                <input type="email" id="email" placeholder="Your Email address" required>
        
                <label for="message">MESSAGE:*</label>
                <textarea id="message" placeholder="Your Message" required></textarea>
        
                <p class="required-note">* Denotes a required field</p>
                <button type="submit" class="send-button">SEND</button>
            </form>
        </div>        
        
    </div>
    <script src="js/scripts.js"></script>

</body>
</html>
